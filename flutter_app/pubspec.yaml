name: smart_road_monitor
description: Smart City Road Monitoring System — Citizen & Worker Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.1

  # HTTP & Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Image
  image_picker: ^1.1.2

  # Storage
  shared_preferences: ^2.3.4

  # UI Utilities
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  badges: ^3.1.2
  fl_chart: ^0.69.2

  # State management
  provider: ^6.1.2

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
